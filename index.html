<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pest Detection System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="container">
    <h1>Pest Detection System</h1>

    <div id="mode-toggle">
      <label>
        <input type="checkbox" id="online-toggle" checked />
        Use Online Search
      </label>
    </div>

    <input type="file" id="image-upload" accept="image/*" />
    <div id="image-wrapper">
      <img id="image-preview" alt="Uploaded pest image" />
      <canvas id="heatmap-canvas" aria-label="Explainable AI heatmap"></canvas>
      <div id="bounding-box"></div>
    </div>

    <div id="pipeline-status">
      <div class="pipeline-step" id="step-preprocess">Image Preprocessing</div>
      <div class="pipeline-step" id="step-model">CNN Model</div>
      <div class="pipeline-step" id="step-detect">Pest Detection</div>
      <div class="pipeline-step" id="step-confidence">Confidence Score</div>
      <div class="pipeline-step" id="step-severity">Severity Analysis</div>
      <div class="pipeline-step" id="step-info">Pest Information</div>
      <div class="pipeline-step" id="step-heatmap">Explainable AI Heatmap</div>
    </div>

    <div id="label-container">
      <strong>Pest:</strong>
      <div id="predictions"></div>
    </div>

    <div id="search-info">
      <h2>About the Pest</h2>
      <div id="search-results"></div>
    </div>
  </div>
<footer style="margin-top: 40px; padding: 20px; background-color: #f8f9fa; border-top: 1px solid #ddd; font-size: 14px; color: #555;">
  <p>&copy; 2025 Pest Detection System. All rights reserved.</p>
  <p>Developed by <b>AS~Ibrahim</b></p>
</footer>
 
<script src="js/tf.min.js"></script>
<script src="js/teachablemachine-image.min.js"></script>
<script src="script.js"></script>

</body>
</html>
